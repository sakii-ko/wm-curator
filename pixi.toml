[workspace]
channels = ["rapidsai", "conda-forge"]
name = "cosmos-curator"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
version = "1.0.0"

[activation.env]
PYTHONNOUSERSITE = "1"  # isolate pixi environments from user/system site-packages

[dependencies]
python = ">=3.12.13,<3.13"
pip = "*"

[feature.core]
platforms = ["linux-64", "linux-aarch64"]

[feature.core.dependencies]
astral = "*"
attrs = "*"
azure-identity = "*"
azure-storage-blob = "*"
cattrs = "*"
easydict = "*"
fastapi = "*"
huggingface_hub = "*"
jinja2 = "*"
loguru = "*"
mcap = ">=1.3.1,<2.0.0"
numpy = ">2,<2.3" # opencv-python-headless requires >=2; numba 0.61.x requires <2.3
nvidia-ml-py = "*"
nvtx = "*"
openssl = ">=3.6.2,<4.0a0" # default env: bin/openssl (e.g. CVE-2026-28386 fixed in 3.6.2+)
pandas = "*"
pyarrow = "*"
pydantic = ">=2.12,<3"
pyproj = "*"
pyjwt = ">=2.12.0" # CVE remediation: require 2.12+ (fixes vs vulnerable 2.11.x in default/core envs)
pytest = "*"
pytest-asyncio = "*"
pytest-cov = "*"
pytest-xdist = "*"
scipy = "*"
setuptools = "<81" # prettytable 2.0 (via ngcsdk) requires pkg_resources, removed in setuptools 81
starlette = "<1"  # Ray Serve imports starlette during broad GPU test collection
tabulate = "*"
tblib = "*"
tenacity = "*"
timezonefinder = "*"
tqdm = "*"
typer = ">=0.21.0"
uvicorn = "*"
websockets = "<16" # google-genai requires websockets<16

[feature.core.pypi-dependencies]
cosmos-xenna = "==0.4.3"
google-genai = ">=1.59.0" # conda-forge package is too old
ngcsdk = "*" # not available on conda-forge
pillow = ">=12.2.0"  # CVE-2026-40192: patched in Pillow 12.2.0+ (core PyPI dep)
pyasn1 = ">=0.6.3" # CVE remediation: require 0.6.3+ (fixes vs vulnerable 0.6.2 in default/core envs)
pylance = ">=0.39.0" # conda-forge package is too old
pulp = "*" # conda-forge package is too old
ray = { version = "==2.55.1", extras = ["default", "data"] } # conda-forge package pulls in an old version of protobuf
webdataset = "*" # conda-forge package pulls in pytorch

[feature.core.tasks]
hello-world = "python -m cosmos_curator.pipelines.examples.hello_world_pipeline"
model-download = "python -m cosmos_curator.core.managers.model_cli download"
run-pipeline = "python -m cosmos_curator.client.pipeline_cli.pipeline_runtime"
video-pipeline = "python -m cosmos_curator.pipelines.video.run_pipeline"
gputest = "pytest -m env tests/cosmos_curator/pipelines tests/cosmos_curator/models"

[feature.tools]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

[feature.tools.dependencies]
pre-commit = "==4.2.0"
pydantic = ">=2.12,<3"
python-build = "*"
setuptools = "<81" # prettytable 2.0 (via ngcsdk) requires pkg_resources, removed in setuptools 81
setuptools-scm = ">=8"

[feature.tools.pypi-dependencies]
cosmos-curator = { path = ".", editable = true }
ruff = "==0.15.15"

[feature.tools.tasks]
build = "python -m build"
cosmos-curator = "python -m cosmos_curator.client.cli"
pre-commit = "pre-commit"
ruff = "ruff"

[feature.cluster]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[feature.cluster.dependencies]
nvitop = "*"
nvtop = "*"

[feature.cluster.pypi-dependencies]
awscli = "*"
awscli-plugin-endpoint = "*"

[feature.cluster.tasks]
nvitop = "nvitop"
nvtop = "nvtop"

[feature.dev]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[feature.dev.dependencies]
gpustat = "*"
pytest-mock = "*"
safetensors = "*"

[feature.dev.pypi-dependencies]
av = "==17.0.0"  # PyAV; pinned because 17.0.1 deadlocks in CodecContext.__dealloc__ during multi-threaded decode when a Python log callback is installed (TODO: unpin once PyAV releases a fix). Sourced from PyPI so image builds can replace it with a source build linked to /opt/ffmpeg; local/dev envs use the wheel as-is.
mypy = "==2.1.0"
openai = "*"
opencv-python-headless = "*" # not available on conda-forge
pandas-stubs = "*"
torch = "==2.11.0"
torchvision = "==0.26.0"
twine = "==6.1.0"
types-aiofiles = "*"
types-boto3 = "*"
types-psutil = "*"
types-pyyaml = "*"
types-requests = "*"
types-six = "*"
types-tabulate = "*"
types-toml = "*"
types-tqdm = "*"

[feature.dev.tasks]
mypy = "mypy"
pytest = "pytest"

[feature.runtime.system-requirements]
cuda = "13.0.2" # match the version of the nvidia/cuda docker base image
libc = { family = "glibc", version = "2.35" } # vllm cu130 wheels require manylinux_2_35

[feature.runtime]
channels = ["conda-forge", "nvidia"]
platforms = ["linux-64", "linux-aarch64"]

[feature.runtime.dependencies]
cuda-libraries-dev = "*"
gpustat = "*"
libgl = "*" # paddleocr -> opencv-python needs libGL.so.1; previously satisfied transitively via FFmpeg's conda deps
pycountry = "*"

[feature.runtime.pypi-dependencies]
av = "==17.0.0"  # PyAV; pinned because 17.0.1 deadlocks in CodecContext.__dealloc__ during multi-threaded decode when a Python log callback is installed (TODO: unpin once PyAV releases a fix). Sourced from PyPI so image builds can replace it with a source build linked to /opt/ffmpeg; local/dev envs use the wheel as-is.
cbor2 = ">=5.9" # CVE remediation: cbor2 5.9+ (default env; fixes vs vulnerable 5.8.x)
cvcuda-cu13 = "*" # not available on conda-forge
opencv-python-headless = "*" # not available on conda-forge
PyNvVideoCodec = ">=2.0.4,<2.1" # not available on conda-forge - pinned for ffmpeg vulns
timm = "*" # conda-forge package pulls in torchvision, which is behind
torch = "==2.11.0"
torchvision = "==0.26.0"
vllm = "==0.21.0" # not available on conda-forge
# transformers-cosmos3 registers the cosmos3_omni HF AutoConfig type; vllm-cosmos3
# registers Cosmos3ReasonerForConditionalGeneration for the nvidia/Cosmos3-Nano +
# Cosmos3-Super omnimodel reasoning head. Both are subdirectory packages of the
# NVIDIA/cosmos-framework monorepo, installed from the archive tarball (no git
# binary needed in the build container) pinned to a commit for a reproducible lock.
# They must both be declared here: uv only honors vllm-cosmos3's `[tool.uv.sources]`
# for a root project, so vllm-cosmos3's transformers-cosmos3 requirement is
# satisfied by this explicit pin instead.
#
# The `subdirectory = "..."` key selects which package to build from the tarball.
# The `#subdirectory=...` URL fragment is also required and load-bearing: pixi keys
# source packages by URL, so two deps sharing the identical tarball URL collapse to
# one (vllm-cosmos3 gets silently dropped). The differing fragment makes the URLs
# distinct; do not remove it.
transformers-cosmos3 = { url = "https://github.com/NVIDIA/cosmos-framework/archive/cbaf5b9b22abd59a68a25c4504733d97e3435923.tar.gz#subdirectory=packages/transformers-cosmos3", subdirectory = "packages/transformers-cosmos3" }
vllm-cosmos3 = { url = "https://github.com/NVIDIA/cosmos-framework/archive/cbaf5b9b22abd59a68a25c4504733d97e3435923.tar.gz#subdirectory=packages/vllm-cosmos3", subdirectory = "packages/vllm-cosmos3" }
paddlepaddle = { version = "==3.2.*", index = "https://www.paddlepaddle.org.cn/packages/stable/cpu/"} # CPU-only; no CUDA runtime conflict with torch (unlike paddlepaddle-gpu)
paddleocr = "==2.10.*"

[feature.runtime.target.linux-aarch64.dependencies]
# Add CUDA toolchain packages on aarch64 -- these are automatic dependencies on linux-64.
cuda-nvvm-tools = "13.0.*"
cuda-nvcc-tools = "13.0.*"
cuda-nvrtc = "13.0.*"
cuda-nvrtc-dev = "13.0.*"
cuda-nvrtc-static = "13.0.*"
cuda-cupti = "13.0.*"
cuda-cuobjdump = "13.0.*"
cuda-nvdisasm = "13.0.*"
triton = "==3.6.0"

[feature.runtime.target.linux-aarch64.pypi-dependencies]
# Add available NVIDIA CUDA runtime wheels for aarch64 to match linux-64 installs.
# With CUDA 13, most nvidia-*-cu13 PyPI packages are deprecated stubs that fail to build.
# Use unsuffixed names (e.g. nvidia-cublas) for those; keep -cu13 only where real wheels exist.
nvidia-cublas = "*"
nvidia-cuda-cupti = "*"
nvidia-cuda-nvrtc = "*"
nvidia-cuda-runtime = "*"
nvidia-cudnn-cu13 = "*"
nvidia-cufft = "*"
nvidia-curand = "*"
nvidia-cusolver = "*"
nvidia-cusparse = "*"
nvidia-cusparselt-cu13 = "*"
nvidia-cufile = "*"
nvidia-nccl-cu13 = "*"
nvidia-nvjitlink = "*"
nvidia-nvshmem-cu13 = "*"
nvidia-nvtx = "*"

[feature.cuml]
channels = ["nvidia"]
platforms = ["linux-64", "linux-aarch64"]

[feature.cuml.system-requirements]
cuda = "13.0.2" # match the version of the nvidia/cuda docker base image

[feature.cuml.dependencies]
azure-identity = "*"
azure-storage-blob = "*"
cuml = "==26.02"
loguru = "*"
numpy = ">2,<2.3" # opencv-python-headless requires >=2; numba 0.61.x requires <2.3
openssl = ">=3.6.2,<4.0a0" # cuml env: bin/openssl (e.g. CVE-2026-28386 fixed in 3.6.2+)
pillow = ">=12.2.0" # CVE-2026-40192: same floor as core; cuml omits core so pin conda pillow (RAPIDS pulls it), not only core's pypi-dep
pyjwt = ">=2.12.0" # CVE remediation: PyJWT 2.12+ (cuml env; same floor as core)
raft-dask = "*"
setuptools = "<81" # prettytable 2.0 (via ngcsdk) requires pkg_resources, removed in setuptools 81
tornado = ">=6.5.5" # CVE remediation: Tornado 6.5.5+ (cuml env; fixes vs vulnerable 6.5.3)
tqdm = "*"

[feature.cuml.pypi-dependencies]
ngcsdk = "*" # not available on conda-forge
pyasn1 = ">=0.6.3" # CVE remediation: pyasn1 0.6.3+ (cuml env; same floor as core)
pylance = ">=0.39.0" # conda-forge package is too old

[feature.transformers.dependencies]
transformers = ">=4.57.1,<5.0.0" # Transformers v5 changes apply_chat_template to return BatchEncoding instead of input_ids

[feature.transformers.pypi-dependencies]
sentence-transformers = "*" # caption-embedding loader used by split-comparison MetadataStage (BGE small-en-v1.5); installed via PyPI to avoid conda-forge's pytorch downgrade pulling torch back to 2.10.0 and clashing with our pinned torch==2.11.0

# SeedVR2 super-resolution dependencies.
# SeedVR's own requirements.txt pins old versions (e.g. diffusers==0.29.1,
# transformers==4.38.2) but the inference code works fine with newer releases.
# We use unpinned versions to avoid conflicts with other environments.
[feature.seedvr.dependencies]
cuda-libraries-dev = "*"
einops = "*"
omegaconf = "*"

[feature.seedvr.pypi-dependencies]
diffusers = "*"
mediapy = "*" # SeedVR uses mediapy.write_image / write_video for super-resolution output (cosmos_curator/pipelines/video/super_resolution/inference_seedvr2_window.py). PyPI variant: the conda package transitively pulls conda-forge ffmpeg + openh264, which we no longer ship; PyPI mediapy shells out to /opt/ffmpeg via PATH instead.
rotary-embedding-torch = "*"

[feature.legacy-transformers.dependencies]
einops = "*"
transformers = "==4.55.4" # legacy models (cosmos-embed1, internvideo2) require older transformers

[feature.legacy-transformers.pypi-dependencies]
av = "==17.0.0"  # PyAV; pinned because 17.0.1 deadlocks in CodecContext.__dealloc__ during multi-threaded decode when a Python log callback is installed (TODO: unpin once PyAV releases a fix). Sourced from PyPI so image builds can replace it with a source build linked to /opt/ffmpeg; local/dev envs use the wheel as-is.
opencv-python-headless = "*" # not available on conda-forge
timm = "*" # conda-forge package pulls in torchvision, which is behind
torch = "==2.11.0"
torchvision = "==0.26.0"

# PaddleOCR for artificial text (overlay/post-production) detection. Isolated from default's vllm dependencies.
[feature.paddle-ocr.target.linux-64.dependencies]
libgl = "*" # paddleocr -> opencv-python needs libGL.so.1; previously satisfied transitively via FFmpeg's conda deps

[feature.paddle-ocr.target.linux-64.pypi-dependencies]
paddleocr = "*"


# Distributed tracing (OpenTelemetry).
# Included in ALL environments because the Ray tracing hook
# (tracing_hook.py:setup_tracing) runs on every worker, regardless
# of which Pixi env it is assigned to.
[feature.tracing.dependencies]
importlib-metadata = "<8.8.0"  # recent opentelemetry-api versions (after ~1.27) require importlib-metadata<8.8.0; conda-forge now ships 8.8.0

[feature.tracing.pypi-dependencies]
# Lightweight -- pure-Python wheels only.
opentelemetry-api = ">=1.20"
opentelemetry-sdk = ">=1.20"
opentelemetry-exporter-otlp-proto-http = ">=1.20"
opentelemetry-instrumentation-botocore = ">=0.44b0"
opentelemetry-instrumentation-requests = ">=0.44b0"
opentelemetry-instrumentation-urllib3 = ">=0.44b0"
opentelemetry-instrumentation-threading = ">=0.44b0"
opentelemetry-instrumentation-logging = ">=0.44b0"
opentelemetry-instrumentation-fastapi = ">=0.44b0"
wrapt = ">=1.14"

# Stage instrumentation backends (CPU profiling, memory profiling).
# Included in environments that run pipeline stages.
[feature.profiling.pypi-dependencies]
pyinstrument = ">=5.0"
memray = ">=1.14"

[feature.sam3.pypi-dependencies]
# SAM3 (Segment Anything 3) requires transformers>=5.0.0, which conflicts with
# the main transformers feature's <5 runtime contract for chat-template behavior.
# This dedicated environment isolates SAM3 so it can coexist on the same node via
# separate Ray workers.
kernels = "*"
transformers = ">=5.0.0"

[environments]
tools = ["tools"]
cluster = ["tools", "cluster"]
cuml = ["core", "cuml", "tracing"]
default = ["core", "runtime", "transformers", "tracing", "profiling"]
dev = ["tools", "cluster", "core", "transformers", "tracing", "profiling", "dev"]
legacy-transformers = ["core", "legacy-transformers", "tracing", "profiling"]
model-download = ["core", "tracing"]
paddle-ocr = ["core", "paddle-ocr", "tracing", "profiling"]
seedvr = ["core", "runtime", "transformers", "seedvr", "tracing", "profiling"]
sam3 = ["core", "runtime", "sam3", "tracing", "profiling"]
