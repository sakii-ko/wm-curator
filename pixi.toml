[workspace]
channels = ["rapidsai", "conda-forge", "nvidia"]
name = "cosmos-curator"
platforms = ["linux-64", "linux-aarch64"]
version = "1.0.0"

[pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]

[activation.env]
PYTHONNOUSERSITE = "1"  # isolate pixi environments from user/system site-packages

[dependencies]
python = ">=3.12.13,<3.13"
pip = "*"
click = "<8.3.0" # click 8.3.0 is broken

[pypi-dependencies]
cosmos-xenna = "==0.4.0"
ray = { version = "==2.55.0", extras = ["default", "data", "serve"] } # conda-forge package pulls in an old version of protobuf

[feature.core.system-requirements]
cuda = "13.0.2" # match the version of the nvidia/cuda docker base image
libc = { family = "glibc", version = "2.35" } # vllm cu130 wheels require manylinux_2_35

[feature.core.dependencies]
astral = "*"
attrs = "*"
av = "==17.0.0"  # conda dep so it pulls conda-forge FFmpeg (LGPL, full codec suite) instead of PyPI's bundled build; pin: 17.0.1 deadlocks in CodecContext.__dealloc__ during multi-threaded decode when a Python log callback is installed (TODO: unpin once PyAV releases a fix)
ffmpeg = { version = ">=8.1", build = "lgpl_*" }  # pin LGPL variant (not GPL)
azure-identity = "*"
azure-storage-blob = "*"
cattrs = "*"
easydict = "*"
fastapi = "*"
starlette = "<1"  # prometheus-fastapi-instrumentator (via vllm) requires <1.0.0
gpustat = "*"
huggingface_hub = "*"
jinja2 = "*"
loguru = "*"
mcap = ">=1.3.1,<2.0.0"
numpy = ">2,<2.3" # opencv-python-headless requires >=2; numba 0.61.x requires <2.3
nvidia-ml-py = "*"
nvtx = "*"
openssl = ">=3.6.2,<4.0a0" # default env: bin/openssl (e.g. CVE-2026-28386 fixed in 3.6.2+)
pandas = "*"
psycopg2-binary = "*"
pyarrow = "*"
pyproj = "*"
pyjwt = ">=2.12.0" # CVE remediation: require 2.12+ (fixes vs vulnerable 2.11.x in default/core envs)
pytest = "*"
pytest-asyncio = "*"
pytest-cov = "*"
pytest-xdist = "*"
scipy = "*"
setuptools = "<81" # prettytable 2.0 (via ngcsdk) requires pkg_resources, removed in setuptools 81
sqlalchemy = "*"
tabulate = "*"
tblib = "*"
tenacity = "*"
timezonefinder = "*"
tqdm = "*"
typer = ">=0.21.0"
uvicorn = "*"
websockets = "<16" # google-genai requires websockets<16

[feature.core.pypi-dependencies]
google-genai= ">=1.59.0" # conda-forge package is too old
ngcsdk = "*" # not available on conda-forge
opencv-python-headless = "*" # not available on conda-forge
pillow = ">=12.2.0"  # CVE-2026-40192: patched in Pillow 12.2.0+ (core PyPI dep)
pyasn1 = ">=0.6.3" # CVE remediation: require 0.6.3+ (fixes vs vulnerable 0.6.2 in default/core envs)
pylance = ">=0.39.0" # conda-forge package is too old
pulp = "*" # conda-forge package is too old
timm = "*" # conda-forge package pulls in torchvision, which is behind
torch = { version = "==2.10+cu130", index = "https://download.pytorch.org/whl/cu130" }
torchvision = { version = "==0.25.0", index = "https://download.pytorch.org/whl/cu130" }
uvicorn = "*"
webdataset = "*" # conda-forge package pulls in pytorch

[feature.core.target.linux-aarch64.dependencies]
# Add CUDA toolchain packages on aarch64 -- these are automatic dependencies on linux-64.
cuda-nvvm-tools = "13.0.*"
cuda-nvcc-tools = "13.0.*"
cuda-nvrtc = "13.0.*"
cuda-nvrtc-dev = "13.0.*"
cuda-nvrtc-static = "13.0.*"
cuda-cupti = "13.0.*"
cuda-cuobjdump = "13.0.*"
cuda-nvdisasm = "13.0.*"
triton = "==3.6.0"

[feature.core.target.linux-aarch64.pypi-dependencies]
# Add available NVIDIA CUDA runtime wheels for aarch64 to match linux-64 installs.
# With CUDA 13, most nvidia-*-cu13 PyPI packages are deprecated stubs that fail to build.
# Use unsuffixed names (e.g. nvidia-cublas) for those; keep -cu13 only where real wheels exist.
nvidia-cublas = "*"
nvidia-cuda-cupti = "*"
nvidia-cuda-nvrtc = "*"
nvidia-cuda-runtime = "*"
nvidia-cudnn-cu13 = "*"
nvidia-cufft = "*"
nvidia-curand = "*"
nvidia-cusolver = "*"
nvidia-cusparse = "*"
nvidia-cusparselt-cu13 = "*"
nvidia-cufile = "*"
nvidia-nccl-cu13 = "*"
nvidia-nvjitlink = "*"
nvidia-nvshmem-cu13 = "*"
nvidia-nvtx = "*"

[feature.cuml.system-requirements]
cuda = "13.0.2" # match the version of the nvidia/cuda docker base image

[feature.cuml.dependencies]
azure-identity = "*"
azure-storage-blob = "*"
cuml = "==26.02"
loguru = "*"
numpy = ">2,<2.3" # opencv-python-headless requires >=2; numba 0.61.x requires <2.3
openssl = ">=3.6.2,<4.0a0" # cuml env: bin/openssl (e.g. CVE-2026-28386 fixed in 3.6.2+)
pillow = ">=12.2.0" # CVE-2026-40192: same floor as core; cuml omits core so pin conda pillow (RAPIDS pulls it), not only core's pypi-dep
pyjwt = ">=2.12.0" # CVE remediation: PyJWT 2.12+ (cuml env; same floor as core)
raft-dask = "*"
setuptools = "<81" # prettytable 2.0 (via ngcsdk) requires pkg_resources, removed in setuptools 81
tornado = ">=6.5.5" # CVE remediation: Tornado 6.5.5+ (cuml env; fixes vs vulnerable 6.5.3)
tqdm = "*"

[feature.cuml.pypi-dependencies]
ngcsdk = "*" # not available on conda-forge
pyasn1 = ">=0.6.3" # CVE remediation: pyasn1 0.6.3+ (cuml env; same floor as core)
pylance = ">=0.39.0" # conda-forge package is too old

[feature.model-download.dependencies]
azure-identity = "*"
azure-storage-blob = "*"
cattrs = "*"
huggingface_hub = "*"
loguru = "*"
pandas = "*"
numpy = ">2,<2.3" # opencv-python-headless requires >=2; numba 0.61.x requires <2.3
nvidia-ml-py = "*"
openssl = ">=3.6.2,<4.0a0" # model-download env: bin/openssl (e.g. CVE-2026-28386)
pyjwt = ">=2.12.0" # CVE remediation: PyJWT 2.12+ (model-download omits core)
scipy = "*"
setuptools = "<81" # prettytable 2.0 (via ngcsdk) requires pkg_resources, removed in setuptools 81
tabulate = "*"

[feature.model-download.pypi-dependencies]
ngcsdk = "*" # not available on conda-forge
opencv-python-headless = "*" # not available on conda-forge
pyasn1 = ">=0.6.3" # CVE remediation: pyasn1 0.6.3+ (model-download omits core)

[feature.transformers.dependencies]
transformers = ">=4.57.1,<5.0.0" # Transformers v5 changes apply_chat_template to return BatchEncoding instead of input_ids

[feature.unified.dependencies]
cuda-libraries-dev = "*"
pycountry = "*"

# SeedVR2 super-resolution dependencies.
# SeedVR's own requirements.txt pins old versions (e.g. diffusers==0.29.1,
# transformers==4.38.2) but the inference code works fine with newer releases.
# We use unpinned versions to avoid conflicts with other environments.
[feature.seedvr.dependencies]
cuda-libraries-dev = "*"
einops = "*"
mediapy = "*"
omegaconf = "*"

[feature.seedvr.pypi-dependencies]
diffusers = "*"
rotary-embedding-torch = "*"

[feature.unified.pypi-dependencies]
cbor2 = ">=5.9" # CVE remediation: cbor2 5.9+ (unified env; fixes vs vulnerable 5.8.x)
cvcuda-cu13 = "*" # not available on conda-forge
flashinfer-python = "==0.6.6" # not available on conda-forge; pinned to match vllm 0.19.0
PyNvVideoCodec = "*" # not available on conda-forge
vllm = { version = "==0.19.0", index = "https://wheels.vllm.ai/0.19.0/cu130" } # not available on conda-forge
paddlepaddle = { version = "==3.2.*", index = "https://www.paddlepaddle.org.cn/packages/stable/cpu/"} # CPU-only; no CUDA runtime conflict with torch (unlike paddlepaddle-gpu)
paddleocr = "==2.10.*"

[feature.legacy-transformers.dependencies]
einops = "*"
transformers = "==4.55.4" # legacy models (cosmos-embed1, internvideo2) require older transformers

# PaddleOCR for artificial text (overlay/post-production) detection. Isolated from unified's vllm dependencies.
[feature.paddle-ocr.target.linux-64.pypi-dependencies]
paddleocr = "*"


# Distributed tracing (OpenTelemetry).
# Included in ALL environments because the Ray tracing hook
# (tracing_hook.py:setup_tracing) runs on every worker, regardless
# of which Pixi env it is assigned to.
[feature.tracing.dependencies]
importlib-metadata = "<8.8.0"  # recent opentelemetry-api versions (after ~1.27) require importlib-metadata<8.8.0; conda-forge now ships 8.8.0

[feature.tracing.pypi-dependencies]
# Lightweight -- pure-Python wheels only.
opentelemetry-api = ">=1.20"
opentelemetry-sdk = ">=1.20"
opentelemetry-exporter-otlp-proto-http = ">=1.20"
opentelemetry-instrumentation-botocore = ">=0.44b0"
opentelemetry-instrumentation-requests = ">=0.44b0"
opentelemetry-instrumentation-urllib3 = ">=0.44b0"
opentelemetry-instrumentation-threading = ">=0.44b0"
opentelemetry-instrumentation-logging = ">=0.44b0"
opentelemetry-instrumentation-sqlalchemy = ">=0.44b0"
opentelemetry-instrumentation-fastapi = ">=0.44b0"
wrapt = ">=1.14"

# Stage instrumentation backends (CPU profiling, memory profiling).
# Included in environments that run pipeline stages.
[feature.profiling.pypi-dependencies]
pyinstrument = ">=5.0"
memray = ">=1.14"

[feature.sam3.pypi-dependencies]
# SAM3 (Segment Anything 3) requires transformers>=5.0.0, which conflicts with
# vLLM's hard cap of transformers<5.  This dedicated environment isolates
# SAM3 from vLLM so both can coexist on the same node via separate Ray workers.
kernels = "*"
transformers = ">=5.0.0"

[environments]
cuml = ["cuml", "tracing"]
default = ["core", "tracing", "profiling"]
legacy-transformers = ["core", "legacy-transformers", "tracing", "profiling"]
model-download = ["model-download", "tracing"]
paddle-ocr = ["core", "paddle-ocr", "tracing", "profiling"]
seedvr = ["core", "transformers", "seedvr", "tracing", "profiling"]
transformers = ["core", "transformers", "tracing", "profiling"]
sam3 = ["core", "sam3", "tracing", "profiling"]
unified = ["core", "transformers", "unified", "tracing", "profiling"]
